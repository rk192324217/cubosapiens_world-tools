<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Serif+Display:ital@0;1&family=Barlow+Condensed:wght@300;400;500;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f7f6f1;
  --black:#0c0c0a;
  --white:#ffffff;
  --gray-1:#ebebE5;
  --gray-2:#d4d4cc;
  --gray-3:#9a9a90;
  --gray-4:#5a5a52;
  --border:1px solid #0c0c0a;
  --border-thin:0.5px solid #d4d4cc;
  --mono:'Space Mono',monospace;
  --serif:'DM Serif Display',serif;
  --sans:'Barlow Condensed',sans-serif;
}

body{
  background:var(--bg);
  font-family:var(--sans);
  color:var(--black);
  min-height:100vh;
}

/* TOPBAR */
.topbar{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--black);
  color:var(--white);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 32px;
  height:52px;
  border-bottom:2px solid var(--black);
}
.topbar-left{
  display:flex;
  align-items:baseline;
  gap:14px;
}
.topbar-title{
  font-family:var(--serif);
  font-size:22px;
  letter-spacing:-0.5px;
}
.topbar-title em{font-style:italic;font-size:18px;}
.topbar-subtitle{
  font-family:var(--mono);
  font-size:9px;
  color:#888;
  letter-spacing:3px;
  text-transform:uppercase;
}
.topbar-right{
  display:flex;
  align-items:center;
  gap:16px;
}
.clock{
  font-family:var(--mono);
  font-size:13px;
  color:#fbff00;
  letter-spacing:2px;
  min-width:76px;
  text-align:right;
}
.progress-pill{
  font-family:var(--mono);
  font-size:10px;
  background:#1a1a1a;
  border:1px solid #333;
  padding:4px 12px;
  color:#aaa;
  letter-spacing:1px;
}
.progress-pill span{color:var(--white);font-weight:700;}
.btn-print{
  font-family:var(--mono);
  font-size:10px;
  background:var(--white);
  color:var(--black);
  border:none;
  padding:6px 16px;
  cursor:pointer;
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:700;
  transition:background 0.15s;
}
.btn-print:hover{background:#ddd;}
.btn-reset{
  font-family:var(--mono);
  font-size:10px;
  background:transparent;
  color:#666;
  border:1px solid #333;
  padding:6px 14px;
  cursor:pointer;
  letter-spacing:1px;
  text-transform:uppercase;
  transition:all 0.15s;
}
.btn-reset:hover{color:#fff;border-color:#888;}

/* MAIN LAYOUT */
.main{
  max-width:1280px;
  margin:0 auto;
  padding:28px 24px 60px;
}

/* FILTER BAR */
.filter-bar{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:28px;
  flex-wrap:wrap;
}
.filter-label{
  font-family:var(--mono);
  font-size:9px;
  color:var(--gray-3);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-right:4px;
}
.filter-btn{
  font-family:var(--mono);
  font-size:9.5px;
  padding:4px 12px;
  border:var(--border);
  background:transparent;
  cursor:pointer;
  letter-spacing:1px;
  text-transform:uppercase;
  transition:all 0.12s;
  color:var(--black);
}
.filter-btn:hover,.filter-btn.active{
  background:var(--black);
  color:var(--white);
}
.search-box{
  margin-left:auto;
  font-family:var(--mono);
  font-size:11px;
  padding:5px 12px;
  border:var(--border);
  background:var(--white);
  outline:none;
  width:220px;
  color:var(--black);
}
.search-box::placeholder{color:var(--gray-3);}

/* TOPIC SECTIONS */
.topic-section{
  margin-bottom:32px;
}
.topic-header{
  display:flex;
  align-items:baseline;
  gap:12px;
  border-bottom:2px solid var(--black);
  padding-bottom:8px;
  margin-bottom:12px;
  cursor:pointer;
  user-select:none;
}
.topic-header:hover .topic-name{text-decoration:underline;}
.topic-num{
  font-family:var(--serif);
  font-size:32px;
  color:var(--gray-2);
  line-height:1;
  font-style:italic;
}
.topic-name{
  font-size:22px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1px;
  line-height:1;
}
.topic-meta{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:10px;
}
.topic-count{
  font-family:var(--mono);
  font-size:10px;
  color:var(--gray-3);
  letter-spacing:1px;
}
.topic-done-count{
  font-family:var(--mono);
  font-size:10px;
  background:var(--black);
  color:var(--white);
  padding:2px 8px;
}
.topic-toggle{
  font-family:var(--mono);
  font-size:11px;
  color:var(--gray-3);
}
.patterns-row{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  margin-bottom:12px;
}
.pattern-chip{
  font-family:var(--mono);
  font-size:8.5px;
  border:0.5px solid var(--gray-2);
  padding:2px 8px;
  color:var(--gray-4);
  letter-spacing:0.5px;
}

/* PROBLEM TABLE */
.problem-table{
  width:100%;
  border-collapse:collapse;
}
.problem-table thead tr{
  background:var(--gray-1);
  border-top:var(--border);
  border-bottom:var(--border);
}
.problem-table th{
  font-family:var(--mono);
  font-size:8.5px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:7px 10px;
  text-align:left;
  font-weight:700;
  color:var(--gray-4);
}
.problem-table th:first-child{width:36px;text-align:center;}
.problem-table th:nth-child(2){width:40px;}
.problem-table th:nth-child(4){width:90px;}
.problem-table th:last-child{width:80px;}

.problem-table tbody tr{
  border-bottom:var(--border-thin);
  transition:background 0.1s;
}
.problem-table tbody tr:hover{background:#f0f0e8;}
.problem-table tbody tr.done{background:#f8f8f0;}
.problem-table tbody tr.done .prob-name{text-decoration:line-through;color:var(--gray-3);}

.prob-check-cell{text-align:center;padding:0;}
.prob-checkbox{
  width:20px;height:20px;
  border:1.5px solid var(--gray-2);
  background:var(--white);
  cursor:pointer;
  appearance:none;
  -webkit-appearance:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transition:all 0.12s;
  position:relative;
  margin:0;
  flex-shrink:0;
}
.prob-checkbox:checked{
  background:var(--black);
  border-color:var(--black);
}
.prob-checkbox:checked::after{
  content:'';
  position:absolute;
  width:5px;height:9px;
  border-right:2px solid white;
  border-bottom:2px solid white;
  transform:rotate(45deg) translate(-1px,-1px);
}
.prob-checkbox:hover:not(:checked){border-color:var(--black);}

.prob-num{
  font-family:var(--mono);
  font-size:9px;
  color:var(--gray-3);
  padding:10px 6px 10px 10px;
  width:40px;
}
.prob-name-cell{padding:10px 8px;}
.prob-name{
  font-size:14px;
  font-weight:500;
  letter-spacing:0.2px;
}
.prob-link{
  color:var(--black);
  text-decoration:none;
  font-size:14px;
  font-weight:500;
}
.prob-link:hover{text-decoration:underline;color:#1a1aff;}

.diff-badge{
  display:inline-block;
  font-family:var(--mono);
  font-size:8px;
  padding:2px 7px;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:700;
}
.diff-easy{background:#e8ede8;color:#2a6e2a;border:0.5px solid #b0ccb0;}
.diff-medium{background:#f0ece0;color:#7a5c00;border:0.5px solid #d4c080;}
.diff-hard{background:#f0e8e8;color:#8a2020;border:0.5px solid #d4a0a0;}

.pattern-cell{
  font-family:var(--mono);
  font-size:9px;
  color:var(--gray-3);
  padding:10px 8px;
  letter-spacing:0.5px;
}

/* COLLAPSED */
.topic-body.collapsed{display:none;}

/* PRINT STYLES */
@media print{
  @page{size:A4 portrait;margin:14mm 12mm;}
  body{background:white;font-size:12px;}
  .topbar,.filter-bar,.btn-print,.btn-reset,.clock,.progress-pill,.topic-toggle,.filter-label,.search-box{display:none!important;}
  .main{padding:0;max-width:100%;}
  .topic-section{page-break-inside:avoid;margin-bottom:20px;}
  .topic-body.collapsed{display:block!important;}
  .problem-table tbody tr:hover{background:none;}
  .prob-link{color:black!important;text-decoration:none!important;}
  .prob-link::after{content:none!important;}
  a{color:black!important;}
  .print-header{display:block!important;}
  .prob-checkbox{
    border:1px solid #999!important;
    background:white!important;
    print-color-adjust:exact;
    -webkit-print-color-adjust:exact;
  }
  .prob-checkbox:checked{
    background:#000!important;
    border-color:#000!important;
    print-color-adjust:exact;
    -webkit-print-color-adjust:exact;
  }
  .prob-checkbox:checked::after{
    content:'';
    position:absolute;
    width:4px;height:7px;
    border-right:1.5px solid white;
    border-bottom:1.5px solid white;
    transform:rotate(45deg) translate(-1px,-1px);
  }
}
.print-header{
  display:none;
  text-align:center;
  border-bottom:2px solid black;
  padding-bottom:10px;
  margin-bottom:20px;
}
.print-header h1{font-family:var(--serif);font-size:28px;font-style:italic;}
.print-header p{font-family:var(--mono);font-size:9px;color:#666;letter-spacing:3px;margin-top:4px;}

/* EMPTY STATE */
.empty-state{
  text-align:center;
  padding:40px;
  font-family:var(--mono);
  font-size:12px;
  color:var(--gray-3);
  letter-spacing:1px;
}
</style>

const STORAGE_KEY = "cubo_dsa_v1";

function getState(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); }
  catch{ return {}; }
}
function setState(s){ localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); }

function getProbId(topicId,probIdx){ return `${topicId}_${probIdx}`; }

let currentFilter = "all";
let currentSearch = "";

function buildAll(){
  const state = getState();
  const container = document.getElementById("topics-container");
  container.innerHTML = "";
  let totalDone = 0, totalAll = 0;

  DATA.forEach((topic,ti)=>{
    totalAll += topic.problems.length;
    const donePbs = topic.problems.filter((_,pi)=>state[getProbId(topic.id,pi)]).length;
    totalDone += donePbs;

    const section = document.createElement("div");
    section.className = "topic-section";
    section.dataset.topicId = topic.id;

    // Header
    const hdr = document.createElement("div");
    hdr.className = "topic-header";
    hdr.innerHTML = `
      <span class="topic-num">${topic.num}</span>
      <span class="topic-name">${topic.name}</span>
      <div class="topic-meta">
        <span class="topic-count">${topic.problems.length} problems</span>
        <span class="topic-done-count">${donePbs}/${topic.problems.length}</span>
        <span class="topic-toggle">▾</span>
      </div>
    `;

    const body = document.createElement("div");
    body.className = "topic-body";
    body.id = "body_"+topic.id;

    // Patterns row
    const pr = document.createElement("div");
    pr.className = "patterns-row";
    topic.patterns.forEach(p=>{
      const chip = document.createElement("span");
      chip.className = "pattern-chip";
      chip.textContent = p;
      pr.appendChild(chip);
    });
    body.appendChild(pr);

    // Table
    const table = document.createElement("table");
    table.className = "problem-table";
    table.innerHTML = `<thead><tr>
      <th>Done</th><th>#</th><th>Problem</th><th>Pattern</th><th>Difficulty</th>
    </tr></thead>`;
    const tbody = document.createElement("tbody");

    topic.problems.forEach((prob,pi)=>{
      const pid = getProbId(topic.id,pi);
      const isDone = !!state[pid];
      const tr = document.createElement("tr");
      tr.className = isDone ? "done" : "";
      tr.dataset.diff = prob.diff;
      tr.dataset.done = isDone ? "1" : "0";
      tr.dataset.name = prob.name.toLowerCase();

      tr.innerHTML = `
        <td class="prob-check-cell">
          <input type="checkbox" class="prob-checkbox" data-pid="${pid}" ${isDone?"checked":""} />
        </td>
        <td class="prob-num">${String(pi+1).padStart(2,"0")}</td>
        <td class="prob-name-cell">
          <a class="prob-link" href="${prob.url}" target="_blank" rel="noopener">${prob.name}</a>
        </td>
        <td class="pattern-cell">${prob.pattern}</td>
        <td><span class="diff-badge diff-${prob.diff}">${prob.diff}</span></td>
      `;

      const cb = tr.querySelector(".prob-checkbox");
      cb.addEventListener("change",function(){
        const s = getState();
        s[this.dataset.pid] = this.checked;
        setState(s);
        tr.classList.toggle("done",this.checked);
        tr.dataset.done = this.checked ? "1" : "0";
        updateCounts();
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    body.appendChild(table);
    section.appendChild(hdr);
    section.appendChild(body);
    container.appendChild(section);

    hdr.addEventListener("click",()=>{
      body.classList.toggle("collapsed");
      const tog = hdr.querySelector(".topic-toggle");
      tog.textContent = body.classList.contains("collapsed") ? "▸" : "▾";
    });
  });

  document.getElementById("prog-done").textContent = totalDone;
  document.getElementById("prog-total").textContent = totalAll;
  applyFilter();
}

function updateCounts(){
  const state = getState();
  let done=0, total=0;
  DATA.forEach(t=>{
    total += t.problems.length;
    t.problems.forEach((_,pi)=>{ if(state[getProbId(t.id,pi)]) done++; });
  });
  document.getElementById("prog-done").textContent = done;

  // update per-section counts
  DATA.forEach(t=>{
    const donePbs = t.problems.filter((_,pi)=>state[getProbId(t.id,pi)]).length;
    const el = document.querySelector(`[data-topic-id="${t.id}"] .topic-done-count`);
    if(el) el.textContent = `${donePbs}/${t.problems.length}`;
  });
}

function filterDiff(type, btn){
  currentFilter = type;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  applyFilter();
}

function searchProblems(val){
  currentSearch = val.toLowerCase().trim();
  applyFilter();
}

function applyFilter(){
  document.querySelectorAll(".topic-section").forEach(section=>{
    const tbody = section.querySelector("tbody");
    if(!tbody){ section.style.display=""; return; }
    let anyVisible = false;
    tbody.querySelectorAll("tr").forEach(tr=>{
      const diffMatch = currentFilter==="all" || tr.dataset.diff===currentFilter ||
        (currentFilter==="done"&&tr.dataset.done==="1") ||
        (currentFilter==="undone"&&tr.dataset.done==="0");
      const searchMatch = !currentSearch || tr.dataset.name.includes(currentSearch);
      const show = diffMatch && searchMatch;
      tr.style.display = show ? "" : "none";
      if(show) anyVisible = true;
    });
    section.style.display = anyVisible ? "" : "none";
  });
}

function resetAll(){
  if(!confirm("Reset all progress? This cannot be undone.")) return;
  localStorage.removeItem(STORAGE_KEY);
  buildAll();
}

// Clock
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,"0");
  const m = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");
  document.getElementById("clock").textContent = `${h}:${m}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();

buildAll();
</script>
