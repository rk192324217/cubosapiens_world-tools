<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Merge multiple PDFs privately in your browser with CuboSapiens PDF Merger." />
  <meta name="theme-color" content="#0f0f0f" />
  <title>CuboSapiens PDF Merger</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">CuboSapiens Tools</p>
        <h1>PDF Merger</h1>
        <p class="header-copy">Combine PDF files locally in your browser. Your documents never leave your device.</p>
      </div>
    </header>

    <section class="workspace" aria-label="PDF merger workspace">
      <div class="upload-panel">
        <label class="upload-zone" id="uploadZone" for="fileInput" tabindex="0">
          <span class="upload-icon" aria-hidden="true">
            <i class="fa-solid fa-cloud-arrow-up"></i>
          </span>
          <span class="upload-title">Drag PDFs here or click to upload</span>
          <span class="upload-subtitle">Select multiple .pdf files and reorder them before merging.</span>
          <input id="fileInput" type="file" accept=".pdf,application/pdf" multiple />
        </label>

        <div class="message-area" aria-live="polite">
          <p class="message error-message" id="errorMessage">
            <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
            <span></span>
          </p>
          <p class="message success-message" id="successMessage">
            <i class="fa-solid fa-check" aria-hidden="true"></i>
            <span></span>
          </p>
        </div>
      </div>

      <div class="toolbar" aria-label="PDF actions">
        <div class="file-count" id="fileCount">No PDFs loaded</div>
        <div class="toolbar-actions">
          <button class="secondary-button" id="clearButton" type="button" disabled>
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            <span>Clear All</span>
          </button>
          <button class="primary-button" id="mergeButton" type="button" disabled>
            <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
            <span>Merge PDFs</span>
          </button>
        </div>
      </div>

      <section class="file-list" id="fileList" aria-label="Uploaded PDF files">
        <div class="empty-state" id="emptyState">
          <i class="fa-regular fa-file-pdf" aria-hidden="true"></i>
          <p>Add two or more PDF files to begin.</p>
        </div>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
