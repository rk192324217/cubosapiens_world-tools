<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../global/scroll-to-top.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuboGPS</title>
    <meta name="description" content="Stamp GPS location, satellite map, date and time onto your photos for free. No upload needed — works entirely in your browser.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<script src="../global/scroll-to-top.js"></script>
<body>
    <header>


        <!-- Left: Logo -->
        <div class="header-logo">
            <img src="assets/logo_light.png" alt="CuboGPS" class="header-logo-img" id="headerLogo">
        </div>

        <!-- Center: Live visit counter (hover to see downloads too) -->
        <!-- <div class="header-counter" id="headerCounter" title="Loading stats...">
            <i class="fa-solid fa-users"></i>
            <span id="counterValue">—</span>
            <span class="counter-label">visitors</span>
        </div> -->

        <!-- Right: Theme toggle (injected by app.js) -->

    </header>

    <main class="app">
        
        <!-- ── LEFT PANEL ── -->
        <section class="left">

            <div class="image-box" id="imgBox">

                <!-- Hidden until image is uploaded -->
                <img id="img" alt="Uploaded photo">

                <!-- Placeholder shown before upload -->
                <div class="img-placeholder" id="imgPlaceholder">
                    <svg width="52" height="52" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <p>Upload a photo to get started</p>
                </div>

                <!-- GPS overlay — hidden until image is uploaded -->
                <div class="overlay hidden" id="overlay">
                    <div id="ovLocation"></div>
                    <div class="ovRow">
                        <span id="ovLat"></span>
                        <span id="ovLon"></span>
                    </div>
                    <div id="ovDate"></div>
                    <div id="ovTime"></div>
                </div>

            </div>

            <div class="leftControls">
                <label class="btn">
                    Upload &nbsp;<i class="fa-solid fa-upload"></i>
                    <input type="file" id="imgInput" accept="image/*">
                </label>
                <button class="btn" id="renderBtn">
                    Preview&nbsp;<i class="fa-solid fa-eye"></i>
                </button>
            </div>

        </section>

        <!-- ── RIGHT PANEL ── -->
        <section class="right">

            <div class="panel">
                <h3>Map</h3>
                <div id="map"></div>
                <div class="mapBtns">
                    <button id="useGPS">
                        Use Current Location &nbsp;<i class="fa-solid fa-location-crosshairs"></i>
                    </button>
                </div>
                <div class="coordBox">
                    <input id="coordInput" placeholder="e.g. 13.0827, 80.2707">
                    <button id="locateBtn">
                        <i class="fa-solid fa-location-dot"></i> &nbsp;Locate
                    </button>
                </div>
                <div id="locText"></div>
            </div>

            <div class="panel">
                <h3>Date&nbsp;<i class="fa-solid fa-calendar-days"></i></h3>
                <input type="date" id="date">
            </div>

            <div class="panel">
                <h3>Time&nbsp;<i class="fa-solid fa-clock"></i></h3>
                <input type="time" id="time">
            </div>

        </section>

    </main>

    <!-- ── PREVIEW MODAL ── -->
    <div class="modal-backdrop" id="previewModal">
        <div class="modal">

            <div class="modal-header">
                <h2>Preview</h2>
                <button class="modal-close" id="modalClose" title="Close">✕</button>
            </div>

            <div class="modal-spinner" id="modalSpinner">
                <div class="spinner"></div>
                <p>Rendering…</p>
            </div>

            <div class="modal-preview">
                <img id="modalPreviewImg" alt="Rendered preview">
            </div>

            <div class="modal-footer">
                <button class="btn" id="modalDownload" disabled>
                    <i class="fa-solid fa-download"></i>&nbsp; Download
                </button>
            </div>

        </div>
    </div>

    <!-- Scripts: overlay + renderer must load before modules that call them -->
    <script src="modules/overlay.js"></script>
    <script src="modules/renderer.js"></script>
    <script src="modules/image.js"></script>
    <script src="modules/map.js"></script>
    <script src="modules/datetime.js"></script>
    <script src="modules/export.js"></script>
    <script src="app.js"></script>

</body>
</html>
