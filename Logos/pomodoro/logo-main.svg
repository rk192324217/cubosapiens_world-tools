<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&amp;family=Space+Grotesk:wght@700&amp;display=swap');
    </style>

    <!-- Cube face gradients -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B47"/>
      <stop offset="100%" stop-color="#E8451A"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C93510"/>
      <stop offset="100%" stop-color="#B82D0A"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A6A"/>
      <stop offset="100%" stop-color="#FF6B47"/>
    </linearGradient>

    <!-- Glow for the clock dot -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════ -->
  <!-- ISOMETRIC CUBE ICON (80×80 area)   -->
  <!-- ═══════════════════════════════════ -->

  <!-- Shadow beneath cube -->
  <ellipse cx="80" cy="138" rx="38" ry="8" fill="#C93510" opacity="0.18"/>

  <!-- Top face of cube -->
  <polygon points="80,30  118,52  80,74  42,52" fill="url(#topFace)"/>

  <!-- Left face of cube -->
  <polygon points="42,52  80,74  80,118  42,96" fill="url(#leftFace)"/>

  <!-- Right face of cube -->
  <polygon points="80,74  118,52  118,96  80,118" fill="url(#rightFace)"/>

  <!-- Edge highlights -->
  <polyline points="80,30  118,52  118,96  80,118  42,96  42,52  80,30" fill="none" stroke="#fff" stroke-width="0.6" stroke-opacity="0.25"/>
  <line x1="80" y1="74" x2="80" y2="118" stroke="#fff" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- ── Clock face on the top of the cube (isometric projected circle → ellipse) ── -->
  <!-- Ellipse representing a circle on the top face -->
  <ellipse cx="80" cy="52" rx="22" ry="12.7" fill="rgba(0,0,0,0.18)"/>
  <ellipse cx="80" cy="52" rx="19" ry="11" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>

  <!-- Clock hour markers (4 tiny dots in isometric space) -->
  <!-- 12 o'clock -->
  <circle cx="80" cy="41.5" r="1.2" fill="rgba(255,255,255,0.9)"/>
  <!-- 6 o'clock -->
  <circle cx="80" cy="62.5" r="1.2" fill="rgba(255,255,255,0.9)"/>
  <!-- 3 o'clock (right, isometric offset) -->
  <circle cx="90.5" cy="57.5" r="1.2" fill="rgba(255,255,255,0.9)"/>
  <!-- 9 o'clock (left, isometric offset) -->
  <circle cx="69.5" cy="46.5" r="1.2" fill="rgba(255,255,255,0.9)"/>

  <!-- Clock hands (minute hand + hour hand in isometric space) -->
  <!-- Minute hand pointing toward 12 position -->
  <line x1="80" y1="52" x2="80" y2="43.2" stroke="rgba(255,255,255,0.95)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Hour hand pointing toward 3 position -->
  <line x1="80" y1="52" x2="87.5" y2="56.7" stroke="rgba(255,255,255,0.95)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="80" cy="52" r="2" fill="#fff" filter="url(#glow)"/>

  <!-- ── Brain / neural dot pattern on left face ── -->
  <!-- Subtle dot grid suggesting a circuit / brain pattern -->
  <circle cx="54" cy="72" r="1.4" fill="rgba(255,255,255,0.35)"/>
  <circle cx="61" cy="78" r="1.4" fill="rgba(255,255,255,0.35)"/>
  <circle cx="54" cy="84" r="1.4" fill="rgba(255,255,255,0.35)"/>
  <circle cx="61" cy="90" r="1.4" fill="rgba(255,255,255,0.35)"/>
  <circle cx="68" cy="78" r="1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="68" cy="90" r="1" fill="rgba(255,255,255,0.2)"/>
  <line x1="54" y1="72" x2="61" y2="78" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="61" y1="78" x2="54" y2="84" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="54" y1="84" x2="61" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="61" y1="78" x2="68" y2="78" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="61" y1="90" x2="68" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>

  <!-- ── Pomodoro leaf / stem on top corner ── -->
  <!-- Small leaf shape at the top apex of the cube -->
  <path d="M80,30 Q84,22 89,20 Q85,26 80,30 Z" fill="#4CAF66" opacity="0.9"/>
  <path d="M80,30 Q76,21 72,20 Q75,26 80,30 Z" fill="#3D9B55" opacity="0.8"/>
  <!-- Stem -->
  <line x1="80" y1="30" x2="80" y2="22" stroke="#4CAF66" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ═══════════════════════════════════ -->
  <!-- WORDMARK                            -->
  <!-- ═══════════════════════════════════ -->

  <!-- "Cubo" in bold warm tone -->
  <text
    x="155" y="82"
    font-family="'Space Grotesk', 'DM Sans', sans-serif"
    font-weight="700"
    font-size="42"
    letter-spacing="-1"
    fill="#FF6B47">Cubo</text>

  <!-- "Sapiens" in dark/neutral -->
  <text
    x="267" y="82"
    font-family="'Space Grotesk', 'DM Sans', sans-serif"
    font-weight="700"
    font-size="42"
    letter-spacing="-1"
    fill="#1A1A2E">Sapiens</text>

  <!-- Tagline -->
  <text
    x="156" y="106"
    font-family="'DM Sans', sans-serif"
    font-weight="400"
    font-size="13"
    letter-spacing="3.5"
    fill="#888"
    text-anchor="start">FOCUS · THINK · BUILD</text>

  <!-- Separator dot between Cubo and Sapiens — red accent -->
  <circle cx="262" cy="72" r="3.5" fill="#FF6B47"/>

</svg>
