<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B47"/>
      <stop offset="100%" stop-color="#E8451A"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C93510"/>
      <stop offset="100%" stop-color="#B82D0A"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF8A6A"/>
      <stop offset="100%" stop-color="#FF6B47"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="32" cy="57" rx="16" ry="4" fill="#B82D0A" opacity="0.2"/>

  <!-- Cube top face -->
  <polygon points="32,6  55,19  32,32  9,19" fill="url(#topFace)"/>

  <!-- Cube left face -->
  <polygon points="9,19  32,32  32,55  9,42" fill="url(#leftFace)"/>

  <!-- Cube right face -->
  <polygon points="32,32  55,19  55,42  32,55" fill="url(#rightFace)"/>

  <!-- Edge lines -->
  <polyline points="32,6  55,19  55,42  32,55  9,42  9,19  32,6"
    fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="32" y1="32" x2="32" y2="55" stroke="#fff" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Clock ellipse on top face -->
  <ellipse cx="32" cy="19" rx="13" ry="7.5" fill="rgba(0,0,0,0.2)"/>
  <ellipse cx="32" cy="19" rx="11" ry="6.4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.55)" stroke-width="0.7"/>

  <!-- Clock markers -->
  <circle cx="32" cy="13.2" r="0.9" fill="rgba(255,255,255,0.9)"/>
  <circle cx="32" cy="24.8" r="0.9" fill="rgba(255,255,255,0.9)"/>
  <circle cx="39.5" cy="22.5" r="0.9" fill="rgba(255,255,255,0.9)"/>
  <circle cx="24.5" cy="15.5" r="0.9" fill="rgba(255,255,255,0.9)"/>

  <!-- Clock hands -->
  <line x1="32" y1="19" x2="32" y2="14" stroke="rgba(255,255,255,0.95)" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="32" y1="19" x2="37.5" y2="22.2" stroke="rgba(255,255,255,0.95)" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="32" cy="19" r="1.4" fill="#fff" filter="url(#glow)"/>

  <!-- Leaf / stem at top -->
  <path d="M32,6 Q35.5,0.5 39,0 Q36,4 32,6 Z" fill="#4CAF66" opacity="0.9"/>
  <path d="M32,6 Q28.5,0.5 26,0 Q28,4 32,6 Z" fill="#3D9B55" opacity="0.8"/>
  <line x1="32" y1="6" x2="32" y2="1" stroke="#4CAF66" stroke-width="1.2" stroke-linecap="round"/>
</svg>
