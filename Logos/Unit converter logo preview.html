  .row { display: flex; align-items: center; gap: 20px; }

  .files {
    grid-column: 1/-1;
    background: #07090f;
    display: flex; justify-content: center;
    align-items: center; gap: 12px;
    padding: 28px; flex-wrap: wrap;

  .files span { font-size: 10px; letter-spacing: 3px; color: #00CED1; opacity: 0.5; text-transform: uppercase; margin-right: 12px; }
