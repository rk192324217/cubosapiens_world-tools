<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Cube face gradients -->
    <linearGradient id="faceTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7FFFD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CED1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A8CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005F7F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003F5C;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00CED1" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ── Isometric Cube Icon (centered at ~55,60) ── -->
  <g transform="translate(18, 10)" filter="url(#shadow)">
    <!-- Top face -->
    <polygon points="42,8 78,28 42,48 6,28" fill="url(#faceTop)"/>
    <!-- Left face -->
    <polygon points="6,28 42,48 42,88 6,68" fill="url(#faceLeft)"/>
    <!-- Right face -->
    <polygon points="42,48 78,28 78,68 42,88" fill="url(#faceRight)"/>

    <!-- Edge highlights -->
    <polyline points="6,28 42,8 78,28" fill="none" stroke="#A8FFEF" stroke-width="0.8" stroke-opacity="0.6"/>
    <line x1="42" y1="8" x2="42" y2="48" stroke="#A8FFEF" stroke-width="0.8" stroke-opacity="0.4"/>

    <!-- Inner "neural dot" accent — suggests intelligence -->
    <!-- Three small circuit nodes on the top face -->
    <circle cx="42" cy="30" r="2.8" fill="#ffffff" fill-opacity="0.85" filter="url(#glow)"/>
    <circle cx="33" cy="35" r="1.6" fill="#ffffff" fill-opacity="0.55"/>
    <circle cx="51" cy="35" r="1.6" fill="#ffffff" fill-opacity="0.55"/>
    <!-- Connecting lines -->
    <line x1="42" y1="30" x2="33" y2="35" stroke="#ffffff" stroke-width="0.9" stroke-opacity="0.45"/>
    <line x1="42" y1="30" x2="51" y2="35" stroke="#ffffff" stroke-width="0.9" stroke-opacity="0.45"/>
  </g>

  <!-- ── Wordmark ── -->
  <g transform="translate(118, 0)">
    <!-- "Cubo" in bold weight -->
    <text
      x="0" y="68"
      font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
      font-size="44"
      font-weight="700"
      letter-spacing="-1"
      fill="#E8F8FF"
    >Cubo</text>
    <!-- "Sapiens" in lighter teal -->
    <text
      x="107" y="68"
      font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
      font-size="44"
      font-weight="300"
      letter-spacing="-0.5"
      fill="#00CED1"
    >Sapiens</text>
    <!-- Tagline -->
    <text
      x="1" y="88"
      font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
      font-size="11.5"
      font-weight="400"
      letter-spacing="3.5"
      fill="#00A8CC"
      fill-opacity="0.75"
    >THINK IN DIMENSIONS</text>
  </g>

  <!-- Subtle bottom accent line -->
  <line x1="118" y1="96" x2="382" y2="96" stroke="#00CED1" stroke-width="0.75" stroke-opacity="0.3"/>
</svg>
