<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7FFFD4"/>
      <stop offset="100%" style="stop-color:#00CED1"/>
    </linearGradient>
    <linearGradient id="fl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A8CC"/>
      <stop offset="100%" style="stop-color:#005F7F"/>
    </linearGradient>
    <linearGradient id="fr" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077A8"/>
      <stop offset="100%" style="stop-color:#003F5C"/>
    </linearGradient>
    <filter id="g2">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Isometric cube, centered in 64x64 -->
  <g transform="translate(32,32)">
    <!-- Top face: flat top of cube -->
    <polygon points="0,-18 20,-8 0,2 -20,-8" fill="url(#ft)"/>
    <!-- Left face -->
    <polygon points="-20,-8 0,2 0,22 -20,12" fill="url(#fl)"/>
    <!-- Right face -->
    <polygon points="0,2 20,-8 20,12 0,22" fill="url(#fr)"/>
    <!-- Edge highlight -->
    <polyline points="-20,-8 0,-18 20,-8" fill="none" stroke="#B8FFF5" stroke-width="0.7" stroke-opacity="0.6"/>
    <line x1="0" y1="-18" x2="0" y2="2" stroke="#B8FFF5" stroke-width="0.7" stroke-opacity="0.4"/>
    <!-- Central dot (intelligence mark) -->
    <circle cx="0" cy="-5" r="2.2" fill="#ffffff" fill-opacity="0.9" filter="url(#g2)"/>
    <circle cx="-7" cy="0" r="1.2" fill="#ffffff" fill-opacity="0.5"/>
    <circle cx="7" cy="0" r="1.2" fill="#ffffff" fill-opacity="0.5"/>
    <line x1="0" y1="-5" x2="-7" y2="0" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
    <line x1="0" y1="-5" x2="7" y2="0" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>
</svg>
