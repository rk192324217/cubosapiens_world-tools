<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="perfectGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0BE3B" />
      <stop offset="100%" stop-color="#A6841C" />
    </linearGradient>

    <linearGradient id="chiseledLinen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF2DC" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#E0BE3B" stop-opacity="0.2" />
    </linearGradient>

    <filter id="spellBloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#090A0F" />

  <g transform="translate(256, 256)">
    
    <circle r="115" fill="url(#perfectGold)" opacity="0.15" filter="url(#spellBloom)" />

    <polygon points="0,-170 147,-85 0,0 -147,-85" fill="none" stroke="url(#chiseledLinen)" stroke-width="2.2" stroke-linejoin="round" opacity="0.3" />
    <polygon points="-147,-85 -147,85 0,170 0,0" fill="none" stroke="url(#chiseledLinen)" stroke-width="2.2" stroke-linejoin="round" opacity="0.3" />
    <polygon points="147,-85 147,85 0,170 0,0" fill="none" stroke="url(#chiseledLinen)" stroke-width="2.2" stroke-linejoin="round" opacity="0.3" />

    <polygon points="0,-115 100,60 12,60 0,72 -12,60 -100,60" fill="none" stroke="#E0BE3B" stroke-width="5.5" stroke-linejoin="miter" stroke-miterlimit="4" filter="url(#spellBloom)" />
    
    <circle cx="0" cy="8" r="56" fill="none" stroke="url(#perfectGold)" stroke-width="4.5" stroke-dasharray="120 15 40 15" filter="url(#spellBloom)" />

    <polyline points="0,-115 0,-25 -12,5 8,30 0,60" fill="none" stroke="#FFF2DC" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#spellBloom)" />

    <circle cx="0" cy="-115" r="8" fill="#FFF2DC" filter="url(#spellBloom)" />
    <circle cx="100" cy="60" r="6" fill="#FFF2DC" />
    <circle cx="-100" cy="60" r="6" fill="#FFF2DC" />
    
    <circle cx="-12" cy="5" r="4" fill="#E0BE3B" />
    <circle cx="8" cy="30" r="4" fill="#E0BE3B" />
    <circle cx="0" cy="-25" r="5" fill="#A6841C" filter="url(#spellBloom)" />

    <circle cx="0" cy="-170" r="4.5" fill="#E0BE3B" opacity="0.4" />
    <circle cx="147" cy="-85" r="4.5" fill="#E0BE3B" opacity="0.4" />
    <circle cx="147" cy="85" r="4.5" fill="#E0BE3B" opacity="0.4" />
    <circle cx="0" cy="170" r="4.5" fill="#E0BE3B" opacity="0.4" />
    <circle cx="-147" cy="85" r="4.5" fill="#E0BE3B" opacity="0.4" />
    <circle cx="-147" cy="-85" r="4.5" fill="#E0BE3B" opacity="0.4" />

  </g>
</svg>
